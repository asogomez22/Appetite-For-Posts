services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appetite}
      POSTGRES_USER: ${POSTGRES_USER:-appetite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - appetite_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appetite -d appetite"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - appetite_net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://appetiteforposts.com,https://www.appetiteforposts.com}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-auth-secret-in-production}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-43200}
      DB_DIALECT: ${DB_DIALECT:-postgresql}
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-${POSTGRES_DB:-appetite}}
      DB_USER: ${DB_USER:-${POSTGRES_USER:-appetite}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-change_me}}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "172.17.0.1:8087:8000"
    networks:
      - appetite_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.appetiteforposts.com}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
        VITE_ENABLE_ARTICLE_STREAM: ${VITE_ENABLE_ARTICLE_STREAM:-false}
    depends_on:
      - backend
    ports:
      - "172.17.0.1:8086:80"
    networks:
      - appetite_net

networks:
  appetite_net:

volumes:
  appetite_db:
