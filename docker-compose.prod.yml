services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appetite
      POSTGRES_USER: appetite
      POSTGRES_PASSWORD: change_me
    volumes:
      - appetite_db:/var/lib/postgresql/data
    networks: [appetite_net]

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://appetite:change_me@db:5432/appetite
      # Ajusta lo que necesite tu FastAPI (CORS, SECRET_KEY, etc.)
    depends_on: [db]
    networks: [appetite_net]

  frontend:
    build:
      context: ./frontend
    depends_on: [backend]
    # Publicado SOLO en localhost (el proxy será quien lo exponga)
    ports:
      - "127.0.0.1:8086:80"
    networks: [appetite_net]

networks:
  appetite_net:

volumes:
  appetite_db:
